<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 540" fill="none">
  <defs>

    <!-- Dot grid -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.85" fill="#7C3AED" opacity="0.14"/>
    </pattern>

    <!-- Ambient purple glow — top center -->
    <radialGradient id="glow-purple" cx="50%" cy="18%" r="55%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient amber glow — bottom right -->
    <radialGradient id="glow-amber" cx="85%" cy="90%" r="40%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Card background gradient -->
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#18181B"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>

    <!-- Card border — purple top, amber bottom-right -->
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="55%"  stop-color="#3F3F46" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.35"/>
    </linearGradient>

    <!-- SDF icon gradients -->
    <linearGradient id="body-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="fold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="shine-grad" x1="0.1" y1="0" x2="0.9" y2="0.9">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="doc-clip">
      <path d="M42,24 L176,24 L228,76 L228,226 Q228,240 214,240 L42,240 Q28,240 28,226 L28,38 Q28,24 42,24Z"/>
    </clipPath>

    <!-- Icon outer glow -->
    <filter id="icon-glow" x="-45%" y="-40%" width="190%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card outer shadow -->
    <filter id="card-shadow" x="-8%" y="-5%" width="116%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#7C3AED" flood-opacity="0.12"/>
    </filter>

    <!-- Separator gradient -->
    <linearGradient id="sep-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- ════════════════════════════════════════════════════
       BACKGROUND
       ════════════════════════════════════════════════════ -->
  <rect width="480" height="540" fill="#09090B"/>
  <rect width="480" height="540" fill="url(#dots)"/>
  <rect width="480" height="540" fill="url(#glow-purple)"/>
  <rect width="480" height="540" fill="url(#glow-amber)"/>

  <!-- Decorative horizontal scan lines — portal feel -->
  <line x1="0" y1="84"  x2="480" y2="84"  stroke="#7C3AED" stroke-width="0.6" stroke-opacity="0.08"/>
  <line x1="0" y1="168" x2="480" y2="168" stroke="#7C3AED" stroke-width="0.6" stroke-opacity="0.06"/>
  <line x1="0" y1="460" x2="480" y2="460" stroke="#F59E0B" stroke-width="0.6" stroke-opacity="0.06"/>

  <!-- ════════════════════════════════════════════════════
       SDF ICON — top center, glowing
       Scale 256→112 = 0.4375×, center at x=240
       Left edge = 240 - (256×0.4375)/2 = 240 - 56 = 184
       ════════════════════════════════════════════════════ -->
  <g transform="translate(184, 16) scale(0.4375)" filter="url(#icon-glow)">
    <path d="M42,24 L176,24 L228,76 L228,226 Q228,240 214,240 L42,240 Q28,240 28,226 L28,38 Q28,24 42,24Z"
          fill="url(#body-grad)"/>
    <g clip-path="url(#doc-clip)">
      <rect x="28" y="24" width="200" height="216" fill="url(#shine-grad)"/>
    </g>
    <path d="M176,24 L228,76 L176,76Z" fill="url(#fold-grad)"/>
    <path d="M176,24 L176,76 L228,76" fill="none" stroke="#5B21B6" stroke-width="1.2" stroke-opacity="0.38"/>
    <!-- Bar chart mark -->
    <rect x="76"  y="150" width="28" height="28" rx="5" fill="#F59E0B"/>
    <rect x="114" y="122" width="28" height="56" rx="5" fill="#fff" opacity="0.88"/>
    <rect x="152" y="94"  width="28" height="84" rx="5" fill="#F59E0B"/>
    <polyline points="90,150 90,136 128,136 128,122 166,122 166,94"
              fill="none" stroke="#FDE68A" stroke-width="2"
              stroke-dasharray="4 3" stroke-opacity="0.52"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- SDF text -->
    <text x="128" y="222" font-family="-apple-system,'SF Pro Display',sans-serif"
          font-size="44" font-weight="800" fill="#fff"
          text-anchor="middle" letter-spacing="-1">SDF</text>
    <!-- Amber underline -->
    <rect x="86" y="228" width="84" height="3.5" rx="1.75" fill="#F59E0B"/>
  </g>

  <!-- Filename pill below icon -->
  <rect x="168" y="132" width="144" height="26" rx="13"
        fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="240" y="149" text-anchor="middle"
        font-family="'SF Mono','Fira Code',monospace"
        font-size="11" fill="#A78BFA" letter-spacing="0.3">document.sdf</text>

  <!-- Connector from pill to card -->
  <line x1="240" y1="158" x2="240" y2="170"
        stroke="#7C3AED" stroke-width="1" stroke-opacity="0.4"
        stroke-dasharray="3 3"/>

  <!-- ════════════════════════════════════════════════════
       MAIN CARD — terminal anatomy panel
       ════════════════════════════════════════════════════ -->
  <g transform="translate(24, 172)" filter="url(#card-shadow)">

    <!-- Card body -->
    <rect width="432" height="318" rx="12" fill="url(#card-bg)"/>
    <!-- Border -->
    <rect width="432" height="318" rx="12" fill="none"
          stroke="url(#card-border)" stroke-width="1"/>

    <!-- Card header bar -->
    <rect width="432" height="44" rx="12" fill="#1F1F24"/>
    <rect y="32"  width="432" height="12" fill="#1F1F24"/>
    <line x1="0" y1="44" x2="432" y2="44"
          stroke="#27272A" stroke-width="1"/>

    <!-- macOS dots -->
    <circle cx="18" cy="22" r="5" fill="#FF5F57"/>
    <circle cx="34" cy="22" r="5" fill="#FEBC2E"/>
    <circle cx="50" cy="22" r="5" fill="#28C840"/>

    <!-- Header label -->
    <text x="216" y="27" text-anchor="middle"
          font-family="'SF Mono','Fira Code',monospace"
          font-size="11" fill="#52525B">document.sdf — 4 entries</text>

    <!-- ── Row 1: visual.pdf ── -->
    <g transform="translate(0, 56)">
      <rect x="0"  y="0"  width="3"  height="62" fill="#7C3AED"/>
      <rect x="14" y="10" width="36" height="40" rx="7" fill="#7C3AED" opacity="0.12"/>
      <!-- PDF icon lines -->
      <rect x="22" y="18" width="20" height="3" rx="1.5" fill="#A78BFA" opacity="0.65"/>
      <rect x="22" y="24" width="15" height="3" rx="1.5" fill="#A78BFA" opacity="0.45"/>
      <rect x="22" y="30" width="18" height="3" rx="1.5" fill="#A78BFA" opacity="0.35"/>
      <rect x="22" y="36" width="11" height="3" rx="1.5" fill="#A78BFA" opacity="0.25"/>
      <!-- Text -->
      <text x="62" y="26" font-family="'SF Mono','Fira Code',monospace"
            font-size="12.5" font-weight="600" fill="#A78BFA">visual.pdf</text>
      <text x="62" y="43" font-family="-apple-system,system-ui,sans-serif"
            font-size="10.5" fill="#52525B">Human-readable · any PDF viewer opens it</text>
      <!-- Badge -->
      <rect x="364" y="19" width="52" height="18" rx="5" fill="#7C3AED" opacity="0.14"/>
      <text x="390" y="31.5" text-anchor="middle" font-family="'SF Mono',monospace"
            font-size="8" fill="#A78BFA" letter-spacing="0.4">MUST</text>
      <!-- Row separator -->
      <line x1="14" y1="62" x2="418" y2="62" stroke="#27272A" stroke-width="0.75"/>
    </g>

    <!-- ── Row 2: data.json ── -->
    <g transform="translate(0, 118)">
      <rect x="0"  y="0"  width="3"  height="62" fill="#F59E0B"/>
      <rect x="14" y="10" width="36" height="40" rx="7" fill="#F59E0B" opacity="0.10"/>
      <text x="32" y="36" text-anchor="middle"
            font-family="'SF Mono',monospace" font-size="18"
            fill="#F59E0B" opacity="0.65">{}</text>
      <text x="62" y="26" font-family="'SF Mono','Fira Code',monospace"
            font-size="12.5" font-weight="600" fill="#FCD34D">data.json</text>
      <text x="62" y="43" font-family="-apple-system,system-ui,sans-serif"
            font-size="10.5" fill="#52525B">Machine-readable · structured business data</text>
      <rect x="364" y="19" width="52" height="18" rx="5" fill="#F59E0B" opacity="0.12"/>
      <text x="390" y="31.5" text-anchor="middle" font-family="'SF Mono',monospace"
            font-size="8" fill="#FCD34D" letter-spacing="0.4">MUST</text>
      <line x1="14" y1="62" x2="418" y2="62" stroke="#27272A" stroke-width="0.75"/>
    </g>

    <!-- ── Row 3: schema.json ── -->
    <g transform="translate(0, 180)">
      <rect x="0"  y="0"  width="3"  height="62" fill="#8B5CF6"/>
      <rect x="14" y="10" width="36" height="40" rx="7" fill="#8B5CF6" opacity="0.10"/>
      <!-- Grid icon -->
      <rect x="21" y="17" width="8" height="8" rx="1.5" fill="#C4B5FD" opacity="0.45"/>
      <rect x="31" y="17" width="8" height="8" rx="1.5" fill="#C4B5FD" opacity="0.28"/>
      <rect x="21" y="27" width="8" height="8" rx="1.5" fill="#C4B5FD" opacity="0.28"/>
      <rect x="31" y="27" width="8" height="8" rx="1.5" fill="#C4B5FD" opacity="0.45"/>
      <rect x="21" y="37" width="18" height="4"  rx="1.5" fill="#C4B5FD" opacity="0.22"/>
      <text x="62" y="26" font-family="'SF Mono','Fira Code',monospace"
            font-size="12.5" font-weight="600" fill="#C4B5FD">schema.json</text>
      <text x="62" y="43" font-family="-apple-system,system-ui,sans-serif"
            font-size="10.5" fill="#52525B">JSON Schema 2020-12 · validation rules</text>
      <rect x="364" y="19" width="52" height="18" rx="5" fill="#8B5CF6" opacity="0.12"/>
      <text x="390" y="31.5" text-anchor="middle" font-family="'SF Mono',monospace"
            font-size="8" fill="#C4B5FD" letter-spacing="0.4">MUST</text>
      <line x1="14" y1="62" x2="418" y2="62" stroke="#27272A" stroke-width="0.75"/>
    </g>

    <!-- ── Row 4: meta.json ── -->
    <g transform="translate(0, 242)">
      <rect x="0"  y="0"  width="3"  height="62" fill="#6D28D9"/>
      <rect x="14" y="10" width="36" height="40" rx="7" fill="#6D28D9" opacity="0.14"/>
      <!-- Info circle icon -->
      <circle cx="32" cy="30" r="9" fill="none" stroke="#A78BFA"
              stroke-width="1.5" opacity="0.45"/>
      <rect x="30" y="24" width="4" height="4" rx="1" fill="#A78BFA" opacity="0.6"/>
      <rect x="30" y="30" width="4" height="7" rx="1" fill="#A78BFA" opacity="0.5"/>
      <text x="62" y="26" font-family="'SF Mono','Fira Code',monospace"
            font-size="12.5" font-weight="600" fill="#A78BFA">meta.json</text>
      <text x="62" y="43" font-family="-apple-system,system-ui,sans-serif"
            font-size="10.5" fill="#52525B">Identity · provenance · sdf_version</text>
      <rect x="364" y="19" width="52" height="18" rx="5" fill="#6D28D9" opacity="0.14"/>
      <text x="390" y="31.5" text-anchor="middle" font-family="'SF Mono',monospace"
            font-size="8" fill="#A78BFA" letter-spacing="0.4">MUST</text>
    </g>

  </g>

  <!-- ════════════════════════════════════════════════════
       signature.sig — optional floating pill at bottom
       ════════════════════════════════════════════════════ -->
  <g transform="translate(24, 502)">
    <rect width="148" height="24" rx="12"
          fill="#18181B" stroke="#4C1D95" stroke-width="1" stroke-opacity="0.7"/>
    <!-- Lock icon -->
    <rect x="10" y="7" width="10" height="8" rx="2" fill="none"
          stroke="#8B5CF6" stroke-width="1.2" opacity="0.6"/>
    <rect x="13" y="5" width="4" height="4" rx="2" fill="none"
          stroke="#8B5CF6" stroke-width="1.2" opacity="0.6"/>
    <text x="28" y="16.5" font-family="'SF Mono',monospace"
          font-size="9.5" fill="#8B5CF6" opacity="0.75">signature.sig</text>
    <!-- Optional badge -->
    <rect x="122" y="5" width="20" height="14" rx="4" fill="#4C1D95" opacity="0.3"/>
    <text x="132" y="15" text-anchor="middle" font-family="'SF Mono',monospace"
          font-size="7" fill="#8B5CF6">OPT</text>
  </g>

  <!-- One file tagline — bottom right -->
  <text x="456" y="522" text-anchor="end"
        font-family="-apple-system,system-ui,sans-serif"
        font-size="9.5" fill="#3F3F46" letter-spacing="0.2">
    One file · Two layers · Zero re-keying
  </text>

</svg>
